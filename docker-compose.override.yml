version: '3.8'
services:
  frontend:
    build:
      context: ./frontend
      target: builder
    volumes:
      - ./frontend:/app
      - /app/.next
    command: sh -c "npm install && npm run dev"
  backend:
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
  worker:
    volumes:
      - ./backend:/app
